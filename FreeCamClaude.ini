[FOV]
; Degrees per mouse wheel tick
fStep = 2.0
; FOV range limits
fMin = 10.0
fMax = 150.0

[Roll]
; Radians per second while key held
fSpeed = 1.5
; Q = roll counter-clockwise (0x10 = 16)
iKeyCCW = 16
; E = roll clockwise (0x12 = 18)
iKeyCW = 18

[Hotkeys]
; DX scancode for free fly toggle (0 = unmapped)
; Common: F5=63, F6=64, F7=65, F8=66, F9=67, F10=68
iFreeFlyKey = 0
; R = reset FOV + roll (0x13 = 19)
iResetKey = 19
; Mouse controls (not configurable):
;   Shift+Left Click  = toggle camera light
;   Shift+Right Click = freeze time
;   Middle Click      = screenshot (PrintScreen)

[Light]
; Intensity multiplier (0-10, default 1.0)
fIntensity = 1.0
; Radius in game units (100-5000, default 1000)
fRadius = 1000.0
; Fade distance (0.1-10.0, default 1.0)
fFade = 1.0
; Color RGB channels (0.0-1.0 each, default white)
fColorR = 1.0
fColorG = 1.0
fColorB = 1.0
